# Verifies that the committed skills/ directory matches what
# build-skills.sh would produce from the current workflow/ docs.
#
# Catches silent staleness: workflow source edited without rebuilding
# the generated skills/ tree.
#
# Strategy: rebuild from source into a temp dir and `diff -r` it against
# the committed skills/ directory. Both builders (build-skills.sh and
# build-skills.ps1) normalize to LF / no BOM, so their output is
# byte-identical regardless of which one produced the committed tree.

name: Verify skills are in sync with source

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'skills/**'
      - 'scripts/build-skills.sh'
      - '.github/workflows/verify-skills.yml'
  pull_request:
    paths:
      - 'workflow/**'
      - 'skills/**'
      - 'scripts/build-skills.sh'
      - '.github/workflows/verify-skills.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild skills from source into a temp output dir
        run: |
          set -e
          OUTPUT_DIR=/tmp/skills-rebuild bash scripts/build-skills.sh

      - name: Compare committed skills/ with freshly built output
        run: |
          set -e
          if ! diff -r skills /tmp/skills-rebuild; then
            echo ""
            echo "FAIL: committed skills/ is stale."
            echo "      Run: bash scripts/build-skills.sh"
            echo "      Then commit the regenerated skills/ directory."
            exit 1
          fi
          echo "Committed skills/ matches freshly built output."

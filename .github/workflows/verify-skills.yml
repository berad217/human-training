# Verifies that the committed skills/ directory matches what
# build-skills.sh would produce from the current workflow/ docs, and
# that Claude/Codex plugin manifests remain valid and version-aligned.
#
# Catches silent staleness: workflow source edited without rebuilding
# the generated skills/ tree.
#
# Strategy: rebuild from source into a temp dir and `diff -r` it against
# the committed skills/ directory. Both builders (build-skills.sh and
# build-skills.ps1) normalize to LF / no BOM, so their output is
# byte-identical regardless of which one produced the committed tree.

name: Verify skills and plugin manifests

on:
  push:
    branches: [main]
    paths:
      - 'workflow/**'
      - 'skills/**'
      - 'skills-source/**'
      - '.claude-plugin/plugin.json'
      - '.codex-plugin/plugin.json'
      - 'scripts/build-skills.sh'
      - 'scripts/build-skills.ps1'
      - 'scripts/verify-plugin-manifests.py'
      - '.github/workflows/verify-skills.yml'
      - '.gitattributes'
  pull_request:
    paths:
      - 'workflow/**'
      - 'skills/**'
      - 'skills-source/**'
      - '.claude-plugin/plugin.json'
      - '.codex-plugin/plugin.json'
      - 'scripts/build-skills.sh'
      - 'scripts/build-skills.ps1'
      - 'scripts/verify-plugin-manifests.py'
      - '.github/workflows/verify-skills.yml'
      - '.gitattributes'
  workflow_dispatch:

jobs:
  verify-bash:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify plugin manifests
        run: python scripts/verify-plugin-manifests.py

      - name: Rebuild skills from source into a temp output dir
        run: |
          set -e
          OUTPUT_DIR=/tmp/skills-rebuild bash scripts/build-skills.sh

      - name: Compare committed skills/ with freshly built output
        run: |
          set -e
          if ! diff -r skills /tmp/skills-rebuild; then
            echo ""
            echo "FAIL: committed skills/ is stale."
            echo "      Run: bash scripts/build-skills.sh"
            echo "      Then commit the regenerated skills/ directory."
            exit 1
          fi
          echo "Committed skills/ matches freshly built output."

  verify-powershell:
    # Exercises build-skills.ps1 under Windows PowerShell 5.1 (the version
    # shipped with Windows) to catch regressions like missing-BOM / encoding
    # issues that PS 7+ tolerates but 5.1 does not.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify plugin manifests
        shell: powershell
        run: python scripts/verify-plugin-manifests.py

      - name: Rebuild skills via build-skills.ps1 (Windows PowerShell 5.1)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          ./scripts/build-skills.ps1 -OutputDir "$env:RUNNER_TEMP\skills-rebuild-ps"

      - name: Compare committed skills/ with PS-built output
        shell: bash
        run: |
          set -e
          if ! diff -r skills "$RUNNER_TEMP/skills-rebuild-ps"; then
            echo ""
            echo "FAIL: build-skills.ps1 output differs from committed skills/."
            echo "      The two builders must produce byte-identical output."
            exit 1
          fi
          echo "PS builder output matches committed skills/."
